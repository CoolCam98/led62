<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product | LED62</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/index.html">LED62</a>
      <nav class="nav">
        <a href="/index.html">Home</a>
        <a href="/custom.html">Custom</a>
        <a href="/shop.html">Shop All</a>
        <a href="/contact.html">Contact</a>
        <a href="/about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumbs" aria-label="Breadcrumbs" id="breadcrumbs"></nav>

    <div class="product-layout">
      <div class="product-media">
        <img id="product-image" src="" alt="" />
      </div>

      <div class="product-info">
        <h1 id="product-title"></h1>
        <p class="price" id="product-price"></p>
        <p class="sold-out" id="product-soldout" hidden>Sold Out</p>

        <button class="btn" id="add-to-cart" disabled>Add to Cart (coming soon)</button>

        <div class="product-description" id="product-description"></div>
      </div>
    </div>
  </main>

<!-- Footer -->
    <footer class="site-footer" role="contentinfo">
      <div class="container">
        <div class="footer-inner">

      <!-- Left: Contact -->
      <div class="footer-contact">
        <h4>Contact Us</h4>
        <a href="mailto:led62.info@gmail.com">led62.info@gmail.com</a>
        <div class="footer-social" aria-label="Social media links">
          <a href="https://www.instagram.com/led62fl/" aria-label="LED62 on Instagram" rel="noopener noreferrer" target="_blank">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://www.facebook.com/LED62FL/" aria-label="LED62 on Facebook" rel="noopener noreferrer" target="_blank">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          </a>
        </div>
      </div>

      <!-- Right: Email signup -->
      <div class="footer-signup">
        <h4>Stay in the Loop</h4>
        <form name="email-signup" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="footer-form">
          <input type="hidden" name="form-name" value="email-signup" />
          <input type="hidden" name="bot-field" />
          <input type="email" name="email" placeholder="Your email address" required aria-label="Email address" />
          <button type="submit" class="btn btn-pink">Subscribe</button>
        </form>
        <p>New designs, deals, and updates straight to your inbox.</p>
      </div>
    </div>

    <div class="footer-bottom">
      <p>&copy; <span id="year"></span> LED62. All rights reserved.</p>
    </div>
  </div>
</footer>

  <script src="main.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
